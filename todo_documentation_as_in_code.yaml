openapi: 3.0.0
info:
  title: Todo API
  version: 1.0.0

paths:
  /api/v1/todos:
    get:
      summary: List all todo entries
      tags:
        - todo

      definitions:
        Todo:
          type: object
          properties:
            id: { type: string }
            note: { type: string }
            due: { type: string, format: date-time }
            created: { type: string, format: date-time }
            completed: { type: string, format: date-time }
            last_updated: { type: string, format: date-time }
          required: [ id, note, created ]

      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/definitions/Todo'

  /api/v1/todo/{id}:
    get:
      summary: Get a todo entry
      tags:
        - todo
      parameters:
        - name: id
          in: path
          schema: { type: string }
      responses:
        404:
          description: Not Found
        200:
          content:
            application/json:
              schema:
                type: object
                properties:
                  note: { type: string }
                  due: { type: string, format: date-time }
                  done: { type: boolean }
                  created: { type: string, format: date-time }
                  completed: { type: string, format: date-time }
                  last_update: { type: string, format: date-time }

    put:
      summary: Update or create a todo entry
      tags:
        - todo
      parameters:
        - name: id
          in: path
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/definitions/Todo'

      responses:
        400:
          description: Bad Request
        200:
          content:
            application/json:
              schema:
                $ref: '#/defintions/Todo'

    patch:
      summary: Update a todo entry
      tags:
        - todo
      parameters:
        - name: id
          in: path
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                oneOf:
                  - type: object
                    properties:
                      op: { type: string, enum: ['add', 'replace', 'test'] }
                      path: { type: string }
                      value: { }
                    required: [ op, path, value ]
                  - type: object
                    properties:
                      op: { type: string, enum: ['remove', 'replace'] }
                      path: { type: string }
                    required: [ op, path ]
                  - type: object
                    properties:
                      op: { type: string, enum: ['move', 'copy'] }
                      from: { type: string }
                      path: { type: string }
                    required: [ op, from, path ]
              example:
                - op: replace
                  path: /note
                  value: updated note

      responses:
        400:
          description: Bad Request
        404:
          description: Not Found
        422:
          description: Invalid Patch Result
        201:
          description: Test Failed; Patch Not Applied
        200:
          content:
            application/json:
              schema:
                $ref: '#/definitions/Todo'

    delete:
      summary: Remove a todo entry
      tags:
        - todo
      parameters:
        - name: id
          in: path
          schema: { type: string }
      responses:
        204:
          description: Already Removed
        200:
          description: Successfully Removed
          content:
            application/json:
              schema:
                $ref: '#/definitions/Todo'

  /api/v1/todo:
    post:
      summary: Create a new todo entry
      tags:
        - todo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/definitions/CreateTodo'

      definitions:
        CreateTodo:
          type: object
          properties:
            note: { type: string }
            due: { type: string, format: date-time }
          required: [ note ]

      responses:
        400:
          description: Bad Request
        201:
          content:
            application/json:
              schema:
                $ref: '#/definitions/Todo'
