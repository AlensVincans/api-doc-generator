openapi: 3.0.0
info:
  title: Todo API
  version: 1.0.0
paths:
  /api/v1/todos:
    get:
      operationId: list_entries
      summary: List todo entries
      responses:
        default:
          description: General response
  /api/v1/todo:
    post:
      operationId: create
      summary: Create a todo entry
      responses:
        default:
          description: General response
  /api/v1/todo/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: get_entry
      summary: Get a todo entry
      responses:
        default:
          description: General response
    put:
      operationId: update
      summary: Update a todo entry
      responses:
        default:
          description: General response
    patch:
      operationId: patch
      summary: Partially update a todo entry
      responses:
        "201":
          description: Resource updated
    delete:
      operationId: delete
      summary: Delete a todo entry
      responses:
        "204":
          description: Resource deleted successfully