openapi: 3.0.0
info:
  title: Todo API
  version: 1.0.0
paths:
  /api/v1/todos:
    get:
      operationId: list_entries
      summary: List all todo entries
      responses:
        default:
          description: A list of todo entries
  /api/v1/todo:
    post:
      operationId: create
      summary: Create a new todo entry
      responses:
        default:
          description: The created todo entry
  /api/v1/todo/{id}:
    get:
      operationId: get_entry
      summary: Get a todo entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: A single todo entry
    put:
      operationId: update
      summary: Update a todo entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        default:
          description: The updated todo entry
    patch:
      operationId: patch
      summary: Partially update a todo entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: The partially updated todo entry
    delete:
      operationId: delete
      summary: Delete a todo entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Todo entry successfully deleted